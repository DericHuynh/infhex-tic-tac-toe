<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img"
    aria-label="Infinite Hexagonal Tic-Tac-Toe favicon">
    <defs>
        <linearGradient id="infGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7c3aed" />
            <stop offset="35%" stop-color="#06b6d4" />
            <stop offset="68%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#ef4444" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18" />
        </filter>
        <style>
            .navy { stroke:#0f2d4a; }
            .cell { fill:#eaf6ff; stroke:#0f2d4a; stroke-width:6; stroke-linejoin:round; }
            .thin { stroke-width:5; stroke-linecap:round; stroke-linejoin:round; fill:none; }
            .x { stroke:#1296f3; stroke-width:9; stroke-linecap:round; }
            .o { fill:none; stroke:#f5b100; stroke-width:8; }
        </style>
    </defs>

    <!-- Outer hex -->
    <g filter="url(#shadow)">
        <polygon points="128,18 214,67 214,167 128,216 42,167 42,67"
            fill="#f8fcff" stroke="#0f2d4a" stroke-width="8" stroke-linejoin="round" />
    </g>

    <!-- Decorative inner grid -->
    <g opacity="0.95">
        <polygon class="cell" points="128,37 160,55 160,92 128,110 96,92 96,55" />
        <polygon class="cell" points="80,65 112,83 112,120 80,138 48,120 48,83" />
        <polygon class="cell" points="176,65 208,83 208,120 176,138 144,120 144,83" />
        <polygon class="cell" points="128,119 160,137 160,174 128,192 96,174 96,137" />
    </g>

    <!-- X and O marks -->
    <g>
        <circle class="o" cx="176" cy="101" r="16" />
        <path class="x" d="M69 92 L91 114 M91 92 L69 114" />
        <path class="x" d="M117 146 L139 168 M139 146 L117 168" />
    </g>

    <!-- Infinity symbol -->
    <g>
        <path
            d="M47 127
             C47 92, 80 84, 101 104
             L127 128
             L101 152
             C80 172, 47 164, 47 129
             C47 95, 80 92, 100 109
             L155 153
             C175 170, 209 165, 209 128
             C209 91, 175 86, 155 103
             L129 127
             L155 151
             C175 168, 209 164, 209 127"
            fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round"
            stroke-linejoin="round" />
        <path
            d="M47 127
             C47 92, 80 84, 101 104
             L127 128
             L101 152
             C80 172, 47 164, 47 129
             C47 95, 80 92, 100 109
             L155 153
             C175 170, 209 165, 209 128
             C209 91, 175 86, 155 103
             L129 127
             L155 151
             C175 168, 209 164, 209 127"
            fill="none" stroke="#0f2d4a" stroke-width="24" stroke-linecap="round"
            stroke-linejoin="round" />
        <path
            d="M47 127
             C47 92, 80 84, 101 104
             L127 128
             L101 152
             C80 172, 47 164, 47 129
             C47 95, 80 92, 100 109
             L155 153
             C175 170, 209 165, 209 128
             C209 91, 175 86, 155 103
             L129 127
             L155 151
             C175 168, 209 164, 209 127"
            fill="none" stroke="url(#infGrad)" stroke-width="16" stroke-linecap="round"
            stroke-linejoin="round" />
    </g>
</svg>